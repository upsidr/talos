# Talos Configuration Example
# Copy this file to talos.yaml and adjust values for your environment.

proxy:
  listen_address: ":8443"
  backend_address: "localhost:6379"  # Target TCP service (Redis, PostgreSQL, etc.)
  backend_tls: false
  max_connections: 1000
  keepalive_interval: 30s
  revocation_check_interval: 30s  # 0 to disable periodic checks on active connections

tls:
  ca_certificate_path: "dev/ca.crt"
  server_certificate_path: "dev/server.crt"
  server_key_path: "dev/server.key"
  min_version: "1.3"  # 1.2 or 1.3

cache:
  ttl: 60s
  max_entries: 10000

database:
  host: "localhost"
  port: 5432
  name: "talos"
  user: "talos"
  password: ""           # Prefer TALOS_DATABASE_PASSWORD env var
  sslmode: "disable"     # disable, require, verify-ca, verify-full
  # sslrootcert: ""      # Path to CA cert for verify-ca / verify-full
  max_open_connections: 10
  max_idle_connections: 5
  connection_max_lifetime: 30m

# kms:
#   key_resource_name: "projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY/cryptoKeyVersions/1"

certificate:
  default_validity: 2160h  # 90 days
  max_validity: 8760h      # 365 days
  organization: "UPSIDR"

logging:
  format: "json"   # json or console
  level: "info"    # debug, info, warn, error

